name: Typecheck

inputs:
  node-version:
    required: true
    type: string

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup
      with:
        node-version: ${{ inputs.node-version }}
    - run: pnpm typecheck
      shell: bash
    - run: pnpm build && pnpm --prefix demo typecheck
      shell: bash
