name: Publish New Release

on:
  release:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: 24.x

jobs:
  verify:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/verify.yml
    with:
      node-version: 24.x

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
      - run: sudo apt-get install jq
      - run: jq ".version=\"${GITHUB_REF#refs/*/}\"" package.json > package-new.json && mv package-new.json package.json
      - run: cat package.json
      - run: pnpm publish-npm

  deploy-demo:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm --prefix demo i
      - run: pnpm --prefix demo i react-color-a11y@latest
      - name: Set Github identity
        run: |
          git config user.email "support+actions@github.com"
          git config user.name "github-actions-bot"
      - name: Deploy to Github Pages
        run: |
          pnpm build-demo
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          npx gh-pages -d demo/build -u "github-actions-bot <support+actions@github.com>"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
